<div class="w-full flex flex-col items-start gap-[100px] w-[360px] min-w-[280px] h-[640px] pb-[56px] cursor-pointer" [routerLink]="['/products/details', product.id]">
      <!-- Product Image -->
      <div class="flex items-center md:flex-shrink-0 pt-[22px] w-[360px] h-[270px]">
          <img
          [src]="product.images[0]"
          [alt]="product.title"
          class="object-contain w-full h-[150px] md:h-[270px]"
        />
      </div>
      
      <!-- Product Details -->
      <div class="flex flex-col items-center md:items-start justify-between mt-[27px] px-[32px]">
        <h3 class="text-gray-800 font-medium">
          {{product.title}}
        </h3>
        <p class="text-xs font-medium mt-1 line-clamp-2 text-left"
        [ngClass]="isLast ? 'text-white' : 'text-black'">
          {{product.description}}
        </p>
        <div class="flex gap-1 mt-4">
          <button appPopularBtn
            [ngClass]="isLast ? 'bg-black text-white border-white' : 'bg-none text-black'"
            [disabled]="product.stock < 1"
            (click)="$event.stopPropagation(); onAddToCartClick()"
          >
              {{ isLast ? ('cards.Buy_Now' | translate) : ('cards.Add_to_cart' | translate) }}
          </button>
      </div>
      </div>
      
</div>
