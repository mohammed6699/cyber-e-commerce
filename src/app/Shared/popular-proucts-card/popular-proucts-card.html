<div class="flex flex-col items-start gap-[100px] w-[360px] min-w-[280px] h-[640px] pb-[56px]">
      <!-- Product Image -->
      <div class="flex-shrink-0 pt-[22px] w-[360px] h-[270px]">
          <img
          [src]="product.images[0]"
          [alt]="product.title"
          class="w-full h-full"
        />
      </div>
      
      <!-- Product Details -->
      <div class="flex flex-col items-start justify-between mt-[27px] px-[32px]">
        <h3 class="text-gray-800 font-medium">
          {{product.title}}
        </h3>
        <p class="text-xs font-medium mt-1 line-clamp-2 text-left"
        [ngClass]="isLast ? 'text-white' : 'text-black'">
          {{product.description}}
        </p>
        <div class="flex gap-1 mt-4">
          <button class="rounded-[6px] border-1 px-4 py-2"
            [ngClass]="isLast ? 'bg-black text-white border-white' : 'bg-none text-black'"
            [disabled]="product.stock < 1"
            (click)="onAddToCartClick()"
          >
              {{ isLast ? 'Buy Now' : 'Add to cart' }}
          </button>
      </div>
      </div>
      
</div>
