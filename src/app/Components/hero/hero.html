<section class="bg-gradient-to-r from-[#211C24] to-[#211C24]">
    <div class="page pt-[88px] pb-[88px]">
        @if(products && products.length > 0) {
            <div class="flex flex-col md:flex-row justify-between items-center gap-12 md:gap-8">
                <div class="w-full lg:w-[714px] flex flex-col gap-6 text-center md:text-left">
                    <p class="font-semibold text-[16px] md:text-[25px] leading-relaxed text-[#909090] md:text-white">
                        {{ products[0].brand }}
                    </p>
                    <div class="flex flex-col gap-4 md:gap-8">
                        <h1 class="font-medium text-[40px] leading-[48px] md:text-[96px] md:leading-[72px] text-white">
                            {{ products[0].title }}
                        </h1>
                        <p class="text-[14px] md:text-[18px] leading-relaxed text-[#909090]">
                            {{ products[0].description }}
                        </p>
                    </div>
                    <div class="flex justify-center md:justify-start mt-4">
                        <button
                            [routerLink]="'/products'" 
                            class="h-[56px] py-[16px] px-[56px] border border-white hover:bg-white hover:text-[#211C24] transition-all rounded-[6px] text-white text-center font-semibold text-[16px] leading-[24px]">
                            Show more
                        </button>
                    </div> 
                </div>
                <div class="w-full flex justify-center items-center">
                    <img 
                        [src]="products[0].thumbnail" 
                        [alt]="products[0].title"
                        class="max-h-[300px] md:max-h-[450px] object-contain w-auto"
                    />
                </div>
            </div>
        }
    </div>
</section>
