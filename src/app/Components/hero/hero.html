<section class="bg-gradient-to-r from-[#211C24] to-[#211C24]">
    <div class="page pt-[188px] pb-[188px]">
        <!-- right side data -->
        @if(products){
            <div class="flex justify-between">
                <div class="w-[714px] flex flex-col gap-[24px]">
                <p class="font-semibold text-[25px] leading-[32px] text-white">{{products[0].brand}}</p>
                <div class="flex flex-col gap-[48px]">
                    <h1 class="font-medium text-[96px] leading-[72px] text-white tracking-[-4%] mt-[-16px]">{{products[0].title}}</h1>
                    <p class="text-[18px] leading-[24px] text-[#909090]">{{products[0].description}}</p>
                </div>
                <div class="flex">
                    <button
                    [routerLink]="'/products'" 
                    class="h-[56px] py-[16px] px-[56px] border border-1 border-white rounded-[6px] text-white text-center font-semibold text-[16px] leading-[24px]">
                        show more
                    </button>
                </div> 
            </div>
            <!-- left side image -->
            <div>
                <img [src]="products[0].thumbnail"/>
            </div>
        </div>
        }
        
        
    </div>
</section>
