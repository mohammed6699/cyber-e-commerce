<section class="bg-gradient-to-r from-[#211C24] to-[#211C24]">
    <div class="page py-[60px] md:py-[188px]">
        @if(products){
            <div class="flex flex-col md:flex-row justify-between items-center gap-[40px] md:gap-0">
                <!-- first image -->
                <div>
                    <img [src]="products[0].thumbnail" class="max-w-[200px] md:max-w-none"/>
                </div>
                <div class="w-full md:w-[714px] flex flex-col gap-[24px] items-center md:items-start text-center md:text-start">
                    <div class="flex flex-col gap-[24px]">
                        <h1 class="font-thin text-[40px] md:text-[72px] leading-[48px] md:leading-[72px] text-white tracking-[-1px]">{{'announcement.Big_Summer' | translate}} 
                            <span class="font-light text-[40px] md:text-[72px] leading-[48px] md:leading-[72px] text-white">{{'announcement.Sale' | translate}}</span>
                        </h1>
                        <p class="text-[16px] md:text-[18px] leading-[20px] md:leading-[24px] text-[#909090]">{{'announcement.Up_to_60%' | translate}}</p>
                    </div>
                    
                    <div class="flex justify-center md:justify-start w-full">
                        <button
                        [routerLink]="'/products'" 
                        class="h-[56px] py-[16px] px-[40px] md:px-[56px] border border-1 border-white rounded-[6px] text-white font-semibold text-[16px] flex items-center justify-center gap-[12px]">
                            {{'announcement.Show_more' | translate}}
                        </button>
                    </div>
                </div>
                <div>
                    <img [src]="products[0].thumbnail" class="max-w-[200px] md:max-w-none"/>
                </div>
            </div>
        }
    </div>
</section>
