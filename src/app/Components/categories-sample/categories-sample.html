<section class="mx-[160px] mb-[80px]">
    <h1 class="mt-[80px] mb-[32px] font-medium text-[24px] leading-[32px]">Browse By Category</h1>
    @if(categories){
<div class="grid grid-cols-6 gap-[16px]">
    @for (cat of categories.slice(0, 6); track cat.name) {
        <div class="flex flex-col justify-center items-center w-[160px] h-[128px] rounded-[15px] gap-[8px] py-[24px] px-[52px] bg-[#EDEDED] text-black">
            <!-- <img [src]="cat.slug" class="w-[40px] h-[40px] rounded-full" /> -->
            <h1 class="text-center">{{ cat.name }}</h1>
        </div>
    }
</div>
}
</section>
