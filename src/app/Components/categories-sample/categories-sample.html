<section class="mx-[16px] md:mx-[160px] md:mb-[80px]">
    <h1 class="text-center md:text-start mt-[80px] mb-[32px] font-medium text-[24px] leading-[32px]">{{'navBar.Browse_By_Category' | translate}}</h1>
    @if(categories){
<div class="grid grid-cols-2 gap-[16px] px-[16px] md:px-0 md:grid-cols-6 w-full h-[128px]">
    @for (cat of categories.slice(0, 6); track cat.name) {
        <div class="flex flex-col justify-center items-center w-full h-[128px] rounded-[15px] gap-[8px] py-[24px] px-[52px] bg-[#EDEDED] text-black">
            <h1 class="text-center">{{ cat.name }}</h1>
        </div>
    }
</div>
}
</section>
