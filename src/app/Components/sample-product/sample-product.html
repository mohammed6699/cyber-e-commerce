<Section class="grid grid-cols-1 md:grid-cols-2 gap-0">
    @if(products && products.length > 7){
    <!-- left column -->
    <div class="flex flex-col text-black bg-[#FFFFFF]">
        <!-- card 1 -->
        <div class="flex flex-col md:flex-row justify-between items-center w-full overflow-hidden p-6 md:p-0">
            <div class="shrink-0 flex justify-center w-full md:w-auto">
                <img [src]="products[3].thumbnail" class="w-[280px] max-w-full h-auto object-contain md:object-cover"/>
            </div>
            <div class="flex flex-col gap-[16px] px-4 py-6 md:px-[40px] md:py-[60px] text-center md:text-left">
                <h1 class="font-medium text-[32px] leading-[36px] md:text-res tracking-tight">{{products[3].title}}</h1>
                <p class="text-[14px] leading-[24px] text-[#909090] md:desc-res">{{products[3].description}}</p>
            </div>
        </div>
        
        <!-- cards 2 & 3 side by side -->
        <div class="flex flex-col md:flex-row">
            <!-- card 2 -->
            <div class="flex-1 flex flex-col md:flex-row h-auto md:h-[272px] overflow-hidden bg-[#EDEDED] p-6 md:p-0 items-center">
                <!-- image wrapper -->
                <div class="w-[130px] h-[130px] md:h-full shrink-0 flex justify-center items-center">
                    <img [src]="products[6].thumbnail" class="w-full h-full object-contain md:object-cover" />
                </div>
                <!-- text wrapper -->
                <div class="flex flex-col gap-[16px] px-4 py-6 md:px-[16px] md:py-[16px] flex-1 min-w-0 justify-center text-center md:text-left items-center md:items-start">
                    <h1 class="font-medium text-[20px] leading-[28px] md:truncate w-full md:text-res">{{products[6].title}}</h1>
                    <p class="text-[13px] leading-[20px] text-[#909090] line-clamp-3 w-full md:desc-res">{{products[6].description}}</p>
                </div>
            </div>
            <!-- card 3 -->
            <div class="flex-1 flex flex-col md:flex-row h-auto md:h-[272px] overflow-hidden bg-[#353535] text-white p-6 md:p-0 items-center">
                <div class="w-[130px] h-[130px] md:h-full shrink-0 flex justify-center items-center">
                    <img [src]="products[7].thumbnail" class="w-full h-full object-contain md:object-cover" />
                </div>
                <div class="flex flex-col gap-[16px] px-4 py-6 md:px-[16px] md:py-[16px] flex-1 min-w-0 justify-center text-center md:text-left items-center md:items-start">
                    <h1 class="font-medium text-[20px] leading-[28px] md:truncate w-full md:text-res">{{products[7].title}}</h1>
                    <p class="text-[13px] leading-[20px] line-clamp-3 w-full text-white/80 md:desc-res">{{products[7].description}}</p>
                </div>
            </div>
        </div>
    </div>
    <!-- right column (card 4) -->
    <div class="flex flex-col-reverse md:flex-row justify-between items-center w-full bg-[#EDEDED] overflow-hidden p-6 md:p-0">
        <div class="flex flex-col gap-[16px] px-4 py-6 md:px-[56px] md:py-[60px] text-center md:text-left items-center md:items-start">
            <h1 class="font-medium text-[32px] leading-[36px] md:text-res tracking-tight">{{products[4].title}}</h1>
            <p class="text-[14px] leading-[24px] text-[#909090] max-w-[300px] md:desc-res">{{products[4].description}}</p>
        </div>
        <div class="shrink-0 flex justify-center w-full md:w-auto">
            <img [src]="products[4].thumbnail" class="w-[280px] max-w-full h-auto object-contain md:object-cover"/>
        </div>
    </div>
    }
</Section>
