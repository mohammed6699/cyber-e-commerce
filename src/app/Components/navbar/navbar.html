<div class="top-0 py-1 lg:py-2 w-full bg-transparent lg:relative z-50 dark:bg-gray-900">
    <nav class="z-10 sticky top-0 left-0 right-0 mr-[160px] ml-[160px] mx-auto px-5 py-2.5 lg:border-none lg:py-4">
        <div class="flex items-center justify-between">
            <button [routerLink]="'/home'">
                <div class="flex items-center space-x-2">
                    <h2 class="text-black dark:text-white font-bold text-2xl">cyber</h2>
                </div>
            </button>
            <div class="hidden lg:block w-[372px]">
                <div class="relative">
                <input
                    class="border-none bg-[#F5F5F5] pl-10 w-full h-[56px] max-w-[372px] text-gray-800 rounded-lg"
                    id="search"
                    type="text"
                    [(ngModel)]="searchQuery"
                    (input)="onSearch(searchQuery)"
                    placeholder="Search..."
                />
                <div class="absolute left-0 inset-y-0 flex items-center">
                    <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6 ml-3 text-gray-400 hover:text-gray-500"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                    />
                    </svg>
                </div>
                </div>
            </div>
            <div class="hidden lg:block">
                <ul class="flex space-x-10 text-base font-bold text-black/60 dark:text-white">
                    <li
                        class="cursor-pointer text-gray-400 active:text-black">
                        <a [routerLink]="'/home'">Home</a>
                    </li>
                    <li
                        class="cursor-pointer text-gray-400 active:text-black">
                        <a [routerLink]="'/products'">Products</a>
                    </li>
                    <li
                        class="cursor-pointer text-gray-400 active:text-black">
                        <a [routerLink]="'/categories'">Categories</a>
                    </li>
                    <li
                        class="cursor-pointer text-gray-400 active:text-black">
                        <a [routerLink]="'/about-us'">About Us</a>
                    </li>
                </ul>
            </div>
            <div class="hidden lg:flex lg:items-center gap-x-2">
                <ul class="flex space-x-10 text-base font-bold text-black/60 dark:text-white">
                    <li
                        class="hover:underline hover:underline-offset-4 hover:w-fit transition-all duration-100 ease-linear">
                        <a [routerLink]="'/wishlist'" class="relative">
                            <img src="heart.svg" alt="wish list icon"/>
                            @if(wishlistSer.getWishlistCount() > 0) {
                                <span class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center">{{wishlistSer.getWishlistCount()}}</span>
                            }
                        </a>
                    </li>
                    <li
                        class="hover:underline hover:underline-offset-4 hover:w-fit transition-all duration-100 ease-linear">
                        <a [routerLink]="'/cart'" class="relative">
                            <img src="cart.svg" alt="cart icon"/>
                            @if(cartSer.getCartCount() > 0) {
                                <span class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center">{{cartSer.getCartCount()}}</span>
                            }
                        </a>
                    </li>
                    <li
                        class="hover:underline hover:underline-offset-4 hover:w-fit transition-all duration-100 ease-linear">
                        <button [routerLink]="'/login'">
                            <img src="User.svg" alt="user profile icon"/>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
