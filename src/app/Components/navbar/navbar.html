<div class="top-0 py-1 lg:py-2 w-full bg-transparent lg:relative z-50 dark:bg-gray-900">
    <nav class="z-10 sticky top-0 left-0 right-0 lg:mr-[160px] lg:ml-[160px] mx-auto px-5 py-2.5 lg:border-none lg:py-4">
        <div class="flex items-center justify-between">
            <button [routerLink]="'/home'">
                <div class="flex items-center space-x-2">
                    <h2 class="text-black dark:text-white font-bold text-2xl">cyber</h2>
                </div>
            </button>
            
            <!-- Mobile Menu Toggle Button -->
            <button (click)="toggleMenu()" class="lg:hidden p-2">
                <svg class="w-6 h-6 text-black dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>

            <!-- Search bar & Navigation for Large screens -->
            <div class="hidden lg:flex items-center gap-10">
                <div class="w-[372px]">
                    <div class="relative">
                        <input
                            class="border-none bg-[#F5F5F5] pl-10 w-full h-[56px] max-w-[372px] text-gray-800 rounded-lg"
                            type="text"
                            [(ngModel)]="searchQuery"
                            (input)="onSearch(searchQuery)"
                            placeholder="Search..."
                        />
                        <div class="absolute left-0 inset-y-0 flex items-center">
                            <svg class="h-6 w-6 ml-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>
                </div>
                
                <ul class="flex space-x-10 text-base font-bold text-black/60 dark:text-white">
                    <li><a [routerLink]="'/home'">Home</a></li>
                    <li><a [routerLink]="'/products'">Products</a></li>
                    <li><a [routerLink]="'/categories'">Categories</a></li>
                    <li><a [routerLink]="'/about-us'">About Us</a></li>
                </ul>

                <ul class="flex space-x-10">
                    <li><a [routerLink]="'/wishlist'" class="relative"><img src="heart.svg" alt="wish list icon"/></a></li>
                    <li><a [routerLink]="'/cart'" class="relative"><img src="cart.svg" alt="cart icon"/></a></li>
                    <li><button [routerLink]="'/login'"><img src="User.svg" alt="user profile icon"/></button></li>
                </ul>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div [ngClass]="{'block': isMenuOpen, 'hidden': !isMenuOpen}" class="lg:hidden mt-4 bg-white dark:bg-gray-800 p-4 rounded-lg">
            <ul class="flex flex-col space-y-4 text-base font-bold text-black dark:text-white">
                <li><a [routerLink]="'/home'" (click)="toggleMenu()">Home</a></li>
                <li><a [routerLink]="'/products'" (click)="toggleMenu()">Products</a></li>
                <li><a [routerLink]="'/categories'" (click)="toggleMenu()">Categories</a></li>
                <li><a [routerLink]="'/about-us'" (click)="toggleMenu()">About Us</a></li>
            </ul>
        </div>
    </nav>
</div>
