<!-- payment steps -->
<section class="flex justify-between flex-col md:flex-row  items-center">
    <!-- navigation -->
    <div class="ml-[160px] mr-[160px] w-full">
        <div class="flex justify-between items-center">
            <ul class="w-full flex justify-between">
                <li [routerLink]="'address'">
                    <div class="flex justify-center items-center gap-2">
                        <span class="rounded-[50%] flex justify-center items-center ">
                            <img src="Location.svg" alt="location logo"/>
                        </span>
                        <div class="flex flex-col gap-0">
                            <p class="">step1</p>
                            <p class="">Address</p>
                        </div>
                    </div>
                </li>
                <li [routerLink]="'shipping'">
                    <div class="flex justify-center items-center gap-2">
                        <span class="rounded-[50%] flex justify-center items-center ">
                            <img src="Location.svg" alt="location logo"/>
                        </span>
                        <div class="flex flex-col gap-0">
                            <p class="">step2</p>
                            <p class="">Shipping</p>
                        </div>
                    </div>
                </li>
                <li [routerLink]="'payment'" >
                    <div class="flex justify-center items-center gap-2">
                        <span class="rounded-[50%] flex justify-center items-center ">
                            <img src="Location.svg" alt="location logo"/>
                        </span>
                        <div class="flex flex-col gap-0">
                            <p class="">step3</p>
                            <p class="">payment</p>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
        <app-address-page />
    </div>
    <!-- content -->
    <div class="flex justify-center items-center gap-5">
        <router-outlet></router-outlet>
    </div>
</section>
