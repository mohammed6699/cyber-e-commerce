<div class="grid grid-cols-2 gap-[16px] md:gap-[40px] px-[16px] md:px-0 md:grid-cols-6 mx-[16px] md:mx-[160px] ">
@for(cat of categories.slice(0, displayCateogires); track cat.name){
    <a [routerLink]="['/category-products', cat.slug]">
        <section class="bg-white cursor-pointer">
          <div class="">
            <div class="bg-[#EDEDED] text-black text-center flex flex-col justify-center items-center h-[100px] md:h-[150px] md:w-[150px] rounded-xl">
            <h1 class="text-center w-[100px]">{{cat.name}}</h1>
          </div>
          </div>
        </section>
    </a>
}
</div>
<div class="mt-12 flex justify-center mb-[10px]">
  <button (click)="loadMore()" type="button" class="rounded-full border border-stone-300 px-8 py-3 text-[13px] font-medium uppercase tracking-[0.1em] text-stone-900 transition-colors duration-200 hover:bg-stone-100">{{'products.Load_More' | translate}}</button>
</div>
