<app-details-card 
  [product]="product" 
  (addToCart)="AddToCart($event)" 
  (wishList)="AddToWishlist($event)" 
/>
<!-- details section -->
<app-details-component
  [product]="product"
/>
<!-- review section -->
<app-reviews-component 
 [product]="product"
/>

<!-- Related Products -->
@if (relatedProducts.length > 0) {
  <section class="mt-10 md:px-[160px] mb-10">
    <h2 class="text-2xl font-semibold mb-5 text-center md:text-start">{{'products.Related_Products' | translate}}</h2>
    <div class="grid grid-cols-2 md:flex gap-4 overflow-x-auto pb-4">
      @for(item of relatedProducts; track item.id) {
        <app-product-card 
        [product]="item" 
        (addToCart)="cart($event)"
        (wishList)="AddToWishlist($event)"
        />
      }
    </div>
  </section>
}
