<section class="flex gap-[32px]">
  <!-- filter side bar -->
   <aside class="hidden lg:block lg:w-64 lg:flex-shrink-0 ml-[160px]">
      <div class="flex items-center justify-between">
        <h2 class="font-serif text-lg font-medium text-stone-900">Brand</h2>
      </div>

      <div class="mt-4 divide-y divide-stone-200 border-y border-stone-200">
        <details open class="group py-4">
          <summary class="flex cursor-pointer list-none items-center justify-between text-[13px] font-semibold uppercase tracking-[0.1em] text-stone-900 marker:content-none">
            Category
            <svg class="h-4 w-4 text-stone-400 transition-transform duration-200 group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </summary>
          <ul class="mt-3 space-y-2.5">
            @for(cat of categories; track $index){
              <li><label class="flex items-center gap-2.5 text-sm text-stone-600 hover:text-stone-900">
                  <input (change)="onCategoryChange(cat.slug, $event)" type="checkbox" class="h-3.5 w-3.5 rounded-sm border-stone-300 text-stone-900 focus:ring-stone-900" /> 
                  {{ cat.name }} {{productNum}}
                </label>
              </li>
            }
          </ul>
        </details>

        <details class="group py-4">
          <summary class="flex cursor-pointer list-none items-center justify-between text-[13px] font-semibold uppercase tracking-[0.1em] text-stone-900 marker:content-none">
            Price
            <svg class="h-4 w-4 text-stone-400 transition-transform duration-200 group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </summary>
            <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
              <h2 class="text-2xl font-bold mb-4">Range Slider</h2>
              <div class="mb-4">
                <label for="price-range" class="block text-gray-700 font-bold mb-2">Price Range (Up to {{ maxPrice | currency }})</label>
                <input type="range" id="price-range" class="w-full accent-indigo-600" min="0" max="3000" [value]="minPrice" (input)="updatePrice($event)">
              </div>
              <div class="flex justify-between text-gray-500">
                <span id="minPrice">{{ minPrice | currency }}</span>
                <span id="maxPrice">{{ 3000 | currency }}</span>
              </div>
          </div>
        </details>

        <details class="group py-4">
          <summary class="flex cursor-pointer list-none items-center justify-between text-[13px] font-semibold uppercase tracking-[0.1em] text-stone-900 marker:content-none">
            Rate
            <svg class="h-4 w-4 text-stone-400 transition-transform duration-200 group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </summary>
          <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
              <h2 class="text-2xl font-bold mb-4">Rate Slider</h2>
              <div class="mb-4">
                <label for="rate-range" class="block text-gray-700 font-bold mb-2">Rate Range (Up to 5)</label>
                <input type="range" id="rate-range" class="w-full accent-indigo-600" min="0" max="5" [value]="avgRate" (input)="updateRate($event)">
              </div>
              <div class="flex justify-between text-gray-500">
                <span id="minPrice">{{ avgRate }}</span>
                <span id="maxPrice">{{ 5 }}</span>
              </div>
          </div>
        </details>
      </div>
    </aside>

 <!-- product list section -->
<div class="w-2/3">
  <div class="mb-4 hidden items-center justify-between lg:flex">
        <p class="text-sm text-stone-500">{{total}} items</p>
        <select (change)="onSortChange($event)" class="rounded-md border border-stone-200 bg-white py-2 pl-3 pr-8 text-[13px] font-medium uppercase tracking-[0.08em] text-stone-700 focus:border-stone-400 focus:outline-none focus-visible:ring-2 focus-visible:ring-stone-900">
          <option value="Sort: Featured">Sort: Featured</option>
          <option value="Price: Low to High">Price: Low to High</option>
          <option value="Price: High to Low">Price: High to Low</option>
          <option value="Rate: High to Low">Rate: High to Low</option>
          <option value="Name: A to Z">Name: A to Z</option>
          <option value="Name: Z to A">Name: Z to A</option>
        </select>
      </div>
  <div class="grid grid-cols-3 gap-[16px]">
    @for(prd of productList; track prd.id){
      <app-product-card
        [product]="prd"
        (addToCart)="onAddToCart($event)"
        (wishList)="onWishList($event)"
        [showDetailsBtn]="true"
        (navigateToDetails)="onNavigateToDetails($event)"
      >

      </app-product-card>
        }
  </div>
  <div class="flex items-center justify-center space-x-4 mt-8 mb-4">
    <button 
      (click)="onPageChange(pageNumber - 1)" 
      [disabled]="pageNumber === 1"
      class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed transition-colors">
      Previous
    </button>
    
    <span class="text-gray-700 font-medium">Page {{ pageNumber }} of {{ totalPages }}</span>
    
    <button 
      (click)="onPageChange(pageNumber + 1)" 
      [disabled]="pageNumber >= totalPages"
      class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed transition-colors">
      Next
    </button>
  </div>
</div>
</section>
